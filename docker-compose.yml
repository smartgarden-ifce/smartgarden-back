services:
  postgres:
    image: postgres:16
    container_name: smartgarden-postgres
    environment:
      POSTGRES_DB: smartgarden
      POSTGRES_USER: smartgarden
      POSTGRES_PASSWORD: smartgarden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

