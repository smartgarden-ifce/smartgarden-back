spring:
  application:
    name: smartgarden-back
  datasource:
    url: ${SMARTGARDEN_DB_URL:jdbc:postgresql://localhost:5432/smartgarden}
    username: ${SMARTGARDEN_DB_USERNAME:smartgarden}
    password: ${SMARTGARDEN_DB_PASSWORD:smartgarden}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  jackson:
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: false

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${SMARTGARDEN_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  mqtt:
    enabled: ${SMARTGARDEN_MQTT_ENABLED:true}
    broker-url: ${SMARTGARDEN_MQTT_BROKER_URL:tcp://localhost:1883}
    username: ${SMARTGARDEN_MQTT_USERNAME:smartgarden}
    password: ${SMARTGARDEN_MQTT_PASSWORD:smartgarden_mqtt}
    client-id: ${SMARTGARDEN_MQTT_CLIENT_ID:smartgarden-back}
    telemetry-topic: ${SMARTGARDEN_MQTT_TELEMETRY_TOPIC:smartgarden/devices/+/telemetry}
  sse:
    heartbeat-interval-ms: ${SMARTGARDEN_SSE_HEARTBEAT_INTERVAL_MS:15000}
