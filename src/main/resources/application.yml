spring:
  application:
    name: smartgarden-back
  datasource:
    url: ${SMARTGARDEN_DB_URL:jdbc:postgresql://localhost:5432/smartgarden}
    username: ${SMARTGARDEN_DB_USERNAME:smartgarden}
    password: ${SMARTGARDEN_DB_PASSWORD:smartgarden}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  jackson:
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: false

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${SMARTGARDEN_CORS_ALLOWED_ORIGINS:http://localhost:4200}
