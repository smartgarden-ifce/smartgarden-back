services:
  postgres:
    image: postgres:16
    container_name: smartgarden-postgres
    environment:
      POSTGRES_DB: smartgarden
      POSTGRES_USER: smartgarden
      POSTGRES_PASSWORD: smartgarden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartgarden-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
